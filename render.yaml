services:
  # Web Service principal de la API
  - type: web
    name: quipu-ai
    env: docker
    region: ohio
    plan: free
    branch: main
    healthCheckPath: /healthz
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_ID
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_APP_SECRET
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: REDIS_URL
        fromService:
          type: redis
          name: quipu-redis
          property: connectionString

  # Redis para deduplicación de WhatsApp
  - type: redis
    name: quipu-redis
    region: ohio
    plan: free
    ipAllowList: [] # Solo accesible desde servicios internos de Render
